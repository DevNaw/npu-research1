

<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
  <!-- 🔹 MAJOR -->
  <div>
    <label>สาขาหลัก</label>
    <!-- 🔵 MAJOR -->
    <div class="relative">
        <button
          (click)="toggleDropdown('major', $event)"
          class="w-full border px-3 py-2 rounded-md flex justify-between bg-white"
        >
          {{ selectedMajor?.name_en || 'เลือกสาขาหลัก' }}
          <i class="bi bi-chevron-down"></i>
        </button>
    
        <div *ngIf="activeDropdown === 'major'"  class="dropdown absolute z-50 w-full bg-white border rounded-md mt-1 shadow">
          <ul>
            <li
              *ngFor="let m of majors"
              (click)="selectMajor(m)"
              class="px-4 py-2 hover:bg-gray-200 cursor-pointer"
            >
              {{ m.name_en }}
            </li>
          </ul>
        </div>
      </div>
    
  </div>

  <!-- 🔹 SUB -->
  <div>
    <label>สาขาย่อย</label>
    <!-- 🟢 SUB -->
    <div class="relative">
        <button
          (click)="toggleDropdown('sub', $event)"
          [disabled]="!selectedMajor"
          class="w-full border px-3 py-2 rounded-md flex justify-between bg-white"
        >
          {{ selectedSub?.name_en || 'เลือกสาขาย่อย' }}
          <i class="bi bi-chevron-down"></i>
        </button>
    
        <div *ngIf="activeDropdown === 'sub'" class="dropdown absolute z-50 w-full bg-white border rounded-md mt-1 shadow">
          <ul>
            <li
              *ngFor="let s of subList"
              (click)="selectSub(s)"
              class="px-4 py-2 hover:bg-gray-200 cursor-pointer"
            >
              {{ s.name_en }}
            </li>
          </ul>
        </div>
      </div>
  </div>

  <!-- 🔹 RELATED -->
  <div>
    <label>สาขาที่เกี่ยวข้อง</label>
     <!-- 🟣 RELATED -->
     <div class="relative">
        <button
          (click)="toggleDropdown('related', $event)"
          [disabled]="!selectedSub"
          class="w-full border px-3 py-2 rounded-md flex justify-between bg-white"
        >
          {{ selectedRelated?.name_en || 'เลือกสาขาที่เกี่ยวข้อง' }}
          <i class="bi bi-chevron-down"></i>
        </button>
    
        <div *ngIf="activeDropdown === 'related'" class="dropdown absolute z-50 w-full bg-white border rounded-md mt-1 shadow">
          <ul>
            <li
              *ngFor="let r of relatedList"
              (click)="selectRelated(r)"
              class="px-4 py-2 hover:bg-gray-200 cursor-pointer"
            >
              {{ r.name_en }}
            </li>
          </ul>
        </div>
      </div>
  </div>
</div>
