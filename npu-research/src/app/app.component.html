
<app-loading *ngIf="loading$ | async"></app-loading>

<!-- cookies-consent.component.html -->
<div *ngIf="showCookies"
  class="fixed bottom-0 left-0 right-0 z-50 bg-white border-t border-gray-200 shadow-lg px-6 py-4">

  <div class="max-w-8xl mx-auto flex flex-col md:flex-row md:items-center gap-3">

    <!-- ข้อความ -->
    <div class="flex-1">
      <p class="font-semibold text-gray-800 text-lg mb-1">เว็บไซต์นี้ใช้คุกกี้</p>
      <p class="text-base text-gray-500 leading-relaxed">
        เราใช้คุกกี้และที่เก็บข้อมูลบนเบราว์เซอร์เพื่อให้ระบบทำงานได้ถูกต้อง โดยไม่มีการใช้เพื่อโฆษณาหรือการติดตามบุคคลที่สาม
        <a routerLink="/privacy-policy" class="text-[#118CD9] hover:underline">รายละเอียด</a>
      </p>
    </div>

    <!-- ปุ่ม -->
    <div class="flex items-center gap-4 shrink-0">
      <button (click)="acceptAll()"
        class="bg-[#118CD9] hover:bg-[#0f7ec2] text-white text-sm font-medium px-6 py-2.5 rounded-lg cursor-pointer transition border-0">
        ยอมรับทั้งหมด
      </button>
    </div>

  </div>
</div>

<router-outlet />
