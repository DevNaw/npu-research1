<div class="contain-content bg-gray-100 p-5 md:px-10 text-xl md:text-2xl text-[#394250] font-medium">
  <div class="mx-auto md:py-6">
    <!-- Title -->
    <h1 class="text-3xl md:ml-5 mb-2">เอกสารดาวน์โหลด</h1>
  </div>

  <div class="mb-10 mx-auto p-2 md:px-6 md:py-6 bg-white rounded-xl font-light text-lg">
    <div class="mx-auto">
      <!-- Table -->
      <div class="overflow-x-auto bg-white shadow">
        <table class="w-full min-w-225 table-auto">
          <colgroup>
            <col class="w-[5%]">
            <col class="w-[70%]">
            <col class="w-[25%]">
          </colgroup>
          <thead class="bg-[#394250] text-white">
            <tr>
              <th class="p-1 md:p-2 text-center">#</th>
              <th class="p-1 md:p-2 text-start">เอกสาร</th>
              <th class="p-1 md:p-2 text-center">
                จำนวนครั้งดาวน์โหลด
              </th>
            </tr>
          </thead>

          <tbody>
            <tr
              *ngFor="let doc of paginatedDocument; let i = index"
              class="border-b border-gray-300 bg-gray-200 hover:bg-gray-50 transition"
            >
              <!-- Index -->
              <td class="text-center text-gray-700">
                {{ i + 1 }}
              </td>

              <!-- Document -->
              <td class="p-1 md:p-2">
                <a
                  (click)="downloadFile(doc.docId, doc.file_url)"
                  target="_blank"
                  class="text-indigo-600 hover:underline cursor-pointer font-regular"
                >
                  {{ doc.doc_name }}
                </a>
              </td>

              <!-- Download Count -->
              <td class="p-1 md:p-2 text-center text-gray-700">
                {{ doc.download_count | number }}
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
