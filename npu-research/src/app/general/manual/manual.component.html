<div
  class="contain-content bg-gray-100 p-5 md:px-10 text-xl md:text-2xl font-medium text-[#394250]"
>
  <div class="mx-auto md:py-6 mb-2">
    <!-- Title -->
    <h1 class="text-3xl md:ml-5 text-[#16498C]">คู่มือการใช้งาน</h1>
  </div>

  <div
    class="mb-2 md:mb-10 mx-auto px-2 py-2 md:py-6 bg-white rounded-xl font-light text-lg"
  >
    <div class="mx-auto md:px-6">
      <!-- Table -->
      <div class="w-full overflow-x-auto bg-white shadow-sm">
        <table class="w-full min-w-225 table-auto">
          <colgroup>
            <col class="w-[5%]" />
            <col class="w-[70%]" />
            <col class="w-[25%]" />
          </colgroup>
          <!-- Header -->
          <thead class="bg-[#394250] text-white">
            <tr>
              <th class="p-1 md:p-2 w-20 text-center">#</th>
              <th class="p-1 md:p-2 text-left">เอกสาร</th>
              <th class="p-1 md:p-2 text-center md:w-56">ดาวน์โหลด</th>
            </tr>
          </thead>

          <!-- Body -->
          <tbody>
            <tr
              *ngFor="let doc of documents; let i = index"
              class="border-b border-gray-300 bg-gray-200 hover:bg-indigo-50 transition"
            >
              <!-- Index -->
              <td class="text-center p-1 md:py-4">
                {{ i + 1 }}
              </td>

              <!-- Document -->
              <td class="p-1 md:p-2">
                <div class="flex items-center gap-3 font-light">
                  <i
                    class="bi bi-file-earmark-text text-indigo-500 text-lg"
                  ></i>

                  <a
                    (click)="downloadFile(doc.manual_id, doc.file_url)"
                    target="_blank"
                    class="text-[#16498C] hover:underline wrap-break-word cursor-pointer"
                  >
                    {{ doc.doc_name }}
                  </a>
                </div>
              </td>

              <!-- Download Count -->
              <td class="p-1 md:p-2 text-center">
                {{ doc.download_count | number }}
                <span class="text-lg ml-1">ครั้ง</span>
              </td>
            </tr>

            <!-- Empty State -->
            <tr *ngIf="documents.length === 0">
              <td colspan="3" class="text-center py-10 text-[#394250]">
                <i class="bi bi-folder-x text-3xl block mb-2"></i>
                ไม่พบเอกสาร
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <div
        class="flex flex-col md:flex-row md:justify-end md:items-center mt-4 gap-2 font-light"
      >
        <div class="flex items-center justify-end space-x-1">
          <!-- Prev -->
          <button
            (click)="changePage(currentPage - 1)"
            [disabled]="currentPage === 1"
            class="px-2 md:px-3 py-1 rounded border text-sm disabled:opacity-40 hover:bg-gray-100 cursor-pointer"
          >
            ‹
          </button>

          <!-- Pages -->
          <ng-container *ngFor="let page of visiblePages">
            <!-- ปุ่มตัวเลข -->
            <button
              *ngIf="page !== '...'"
              (click)="changePage(+page)"
              class="px-2 md:px-3 py-1 rounded border text-sm transition cursor-pointer"
              [ngClass]="{
                'bg-[#118CD9] text-white': currentPage === page,
                'hover:bg-gray-100': currentPage !== page
              }"
            >
              {{ page }}
            </button>

            <!-- จุด ... -->
            <span
              *ngIf="page === '...'"
              class="px-2 py-1 text-sm text-gray-400 select-none"
              >...</span
            >
          </ng-container>

          <!-- Next -->
          <button
            (click)="changePage(currentPage + 1)"
            [disabled]="currentPage === totalPages"
            class="px-2 md:px-3 py-1 rounded border text-sm disabled:opacity-40 hover:bg-gray-100 cursor-pointer"
          >
            ›
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
