<div
  class="contain-content bg-gray-100 p-5 md:px-10 text-2xl font-medium text-[#394250]"
>
  <div class="mx-auto md:p-6 mb-1">
    <h1 class="text-3xl">การจัดการผู้ใช้งานทั่วไป</h1>
  </div>

  <div class="mx-auto p-2 mb:p-6 md:mb-10 bg-white rounded-xl">
    <div class="flex justify-between flex-wrap items-center mb-4 mt-2">
      <div class="flex gap-2 font-light text-lg">
        <button
          (click)="openAddModal()"
          class="flex items-center gap-2 bg-[#f2e7ac] hover:bg-[#f2cb05] text-[#394250] px-4 py-2 rounded-md cursor-pointer"
        >
          <i class="bi bi-plus-circle"></i>
          <span class="hidden md:inline">เพิ่มผู้ใช้งาน</span>
        </button>
      </div>

      <div class="flex items-center">
        <label class="text-xl mr-2">Search:</label>
        <input
          type="text"
          [(ngModel)]="searchText"
          (input)="onSearch()"
          placeholder="ค้นหา"
          class="border rounded px-2 py-1 ml-auto text-lg font-light"
        />
      </div>
    </div>
    <div class="w-full overflow-x-auto mt-4 font-light text-lg">
      <table class="w-full min-w-225 table-fixed">
        <colgroup>
          <col class="w-[5%]" />
          <col class="w-[40%]" />
          <col class="w-[25%]" />
          <col class="w-[15%]" />
          <col class="w-[15%]" />
        </colgroup>

        <thead class="bg-[#394250] text-white border-b">
          <tr>
            <th class="p-2">#</th>
            <th class="p-2 text-start">ชื่อ - นามสกุล</th>
            <th class="p-2 text-start">Email</th>
            <th class="p-2">บทบาท</th>
            <th class="p-2">Action</th>
          </tr>
        </thead>

        <tbody>
          <tr
            *ngFor="let users of paginatedUsers; let i = index"
            class="border-b border-gray-300 bg-gray-200 hover:bg-gray-50 transition"
          >
            <td class="text-center p-2">
              {{ (currentPage - 1) * pageSize + i + 1 }}
            </td>
            <td class="p-2">{{ users.first_name + " " + users.last_name }}</td>
            <td class="p-2">{{ users.email }}</td>
            <td class="text-center p-2">
              {{ users.role }}
            </td>
            <td class="text-center p-2">
              <div class="flex justify-center items-center gap-2 flex-wrap">
                <button
                  class="inline-flex items-center justify-center w-9 h-9 rounded-full bg-blue-50 hover:bg-blue-100 text-blue-600 transition cursor-pointer text-xl"
                  title="แก้ไข"
                  (click)="openModal(users.id)"
                >
                  <i class="bi bi-pencil-square"></i>
                </button>

                <button
                  class="inline-flex items-center justify-center w-9 h-9 rounded-full bg-red-50 hover:bg-red-100 text-red-600 transition cursor-pointer text-xl"
                  title="ลบ"
                  (click)="deleteUser(users.id)"
                >
                  <i class="bi bi-trash3"></i>
                </button>
              </div>
            </td>
          </tr>

          <tr *ngIf="paginatedUsers.length === 0">
            <td colspan="5" class="text-center text-gray-500 p-4">
              <i class="bi bi-folder-x text-3xl block mb-2"></i>
              ไม่พบข้อมูล
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div
      class="flex flex-col md:flex-row md:justify-end md:items-center mt-4 gap-2 font-light"
    >
      <div class="flex items-center justify-end space-x-1">
        <!-- Prev -->
        <button
          (click)="changePage(currentPage - 1)"
          [disabled]="currentPage === 1"
          class="px-2 md:px-3 py-1 rounded border text-sm disabled:opacity-40 hover:bg-gray-100 cursor-pointer"
        >
          ‹
        </button>

        <!-- Pages -->
        <ng-container *ngFor="let page of visiblePages">
          <!-- ปุ่มตัวเลข -->
          <button
            *ngIf="page !== '...'"
            (click)="changePage(+page)"
            class="px-2 md:px-3 py-1 rounded border text-sm transition cursor-pointer"
            [ngClass]="{
              'bg-[#f2e7ac] text-[#394250]': currentPage === page,
              'hover:bg-gray-100': currentPage !== page
            }"
          >
            {{ page }}
          </button>

          <!-- จุด ... -->
          <span
            *ngIf="page === '...'"
            class="px-2 py-1 text-sm text-gray-400 select-none"
            >...</span
          >
        </ng-container>

        <!-- Next -->
        <button
          (click)="changePage(currentPage + 1)"
          [disabled]="currentPage === totalPages"
          class="px-2 md:px-3 py-1 rounded border text-sm disabled:opacity-40 hover:bg-gray-100 cursor-pointer"
        >
          ›
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Modal Edit Password -->
<div
  *ngIf="isModalOpen"
  class="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center text-2xl text-[#394250] font-medium"
>
  <div class="bg-white w-full max-w-xl rounded-2xl shadow-xl p-6 relative">
    <!-- Header -->
    <div class="flex items-center justify-between border-b pb-3 mb-5">
      <h2 class="">แก้ไขรหัสผ่าน</h2>

      <button
        (click)="closeModal()"
        class="text-gray-400 hover:text-gray-600 transition cursor-pointer"
      >
        <i class="bi bi-x-lg text-lg"></i>
      </button>
    </div>

    <!-- Content -->
    <div class="space-y-4">
      <!-- Password -->
      <div>
        <label class="mb-1 block">รหัสผ่านใหม่</label>
        <input
          [(ngModel)]="passwordData.new_password"
          type="text"
          placeholder="กรอกรหัสผ่านใหม่"
          class="w-full border rounded-lg px-3 py-2 text-xl font-light"
        />
      </div>

      <!-- Confirm Password -->
      <div>
        <label class="mb-1 block">ยืนยันรหัสผ่าน</label>
        <input
          [(ngModel)]="passwordData.confirm_password"
          type="text"
          placeholder="ยืนยันรหัสผ่าน"
          class="w-full border rounded-lg px-3 py-2 text-xl font-light"
        />
      </div>

      <!-- Footer -->
      <div
        class="flex justify-center gap-3 pt-4 border-t mt-4 font-medium text-xl"
      >
        <button
          (click)="save()"
          class="px-5 py-2 rounded-lg bg-[#f2e7ac] hover:bg-[#f2cb05] text-[#394250] shadow cursor-pointer"
        >
          บันทึก
        </button>

        <button
          (click)="closeModal()"
          class="px-4 py-2 rounded-lg border text-gray-600 hover:bg-gray-100 cursor-pointer"
        >
          ยกเลิก
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Modal Add User -->
<div
  *ngIf="isModalOpenAdd"
  class="fixed inset-0 z-50 flex items-center justify-center px-4 text-[#394250] font-medium text-2xl bg-slate-900/60 backdrop-blur-md"
  (click)="closeModal()"
>
  <div
    class="bg-white rounded-2xl w-full max-w-lg overflow-hidden shadow-2xl"
    style="animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1)"
    (click)="$event.stopPropagation()"
  >
    <!-- Header -->
    <div
      class="relative px-8 py-7 overflow-hidden bg-linear-to-r from-[#f2cb05] to-[#f2e7ac]"
    >
      <button
        (click)="closeModal()"
        class="absolute top-4 right-4 w-8 h-8 rounded-lg flex items-center justify-center text-[#394250] cursor-pointer border-0 z-10 hover:text-white transition"
      >
        ✕
      </button>
      <h2 class="mb-1">เพิ่มผู้ใช้งาน</h2>
      <p class="text-lg">กรอกข้อมูลผู้ใช้งานใหม่ให้ครบถ้วน</p>
    </div>

    <!-- Body -->
    <div class="px-8 py-6 flex flex-col gap-4">
      <!-- ชื่อ - นามสกุล -->
      <div class="grid grid-cols-2 gap-4">
        <div class="flex flex-col gap-1.5">
          <label class="text-lg uppercase tracking-wide text-slate-500"
            >ชื่อ</label
          >
          <input
            type="text"
            [(ngModel)]="newUser.first_name"
            class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-base font-light bg-slate-50 focus:outline-none focus:border-[#f2e7ac] focus:bg-white focus:ring-0.5 focus:ring-[#f2e7ac] transition"
            placeholder="ชื่อจริง"
          />
        </div>
        <div class="flex flex-col gap-1.5">
          <label class="text-lg uppercase tracking-wide text-slate-500"
            >นามสกุล</label
          >
          <input
            type="text"
            [(ngModel)]="newUser.last_name"
            class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-base font-light bg-slate-50 focus:outline-none focus:border-[#f2e7ac] focus:bg-white focus:ring-0.5 focus:ring-[#f2e7ac] transition"
            placeholder="นามสกุล"
          />
        </div>
      </div>

      <!-- อีเมล -->
      <div class="flex flex-col gap-1.5">
        <label class="text-lg uppercase tracking-wide text-slate-500"
          >อีเมล</label
        >
        <input
          type="email"
          [(ngModel)]="newUser.email"
          class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-base font-light bg-slate-50 focus:outline-none focus:border-[#f2e7ac] focus:bg-white focus:ring-0.5 focus:ring-[#f2e7ac] transition"
          placeholder="example@email.com"
        />
      </div>

      <!-- หน่วยงาน -->
      <div class="flex flex-col gap-1.5">
        <label class="text-lg uppercase tracking-wide text-slate-500"
          >หน่วยงาน</label
        >

        <div class="relative">
          <button
            type="button"
            (click)="toggle('organization', $event)"
            class="flex justify-between items-center w-full border border-slate-200 rounded-xl px-4 py-2.5 text-base font-light bg-slate-50 focus:outline-none focus:border-[#f2e7ac] focus:bg-white focus:ring-0.5 focus:ring-[#f2e7ac]] transition appearance-none cursor-pointer"
          >
            <span class="truncate text-lg font-light">
              {{ selectedOrganization?.faculty || "เลือกหน่วยงาน" }}
            </span>
            <i
              class="bi bi-chevron-down"
              [ngClass]="{ 'rotate-180': openDropdown === 'organization' }"
            ></i>
          </button>

          <div
            *ngIf="openDropdown === 'organization'"
            (click)="$event.stopPropagation()"
            class="absolute z-50 w-full bg-white border rounded-md mt-1 shadow font-light text-lg"
          >
            <ul class="max-h-40 overflow-y-auto">
              <li
                *ngFor="let o of organizations"
                (click)="selectOrganization(o)"
                class="px-4 py-2 hover:bg-indigo-50 cursor-pointer"
              >
                {{ o.faculty }}
              </li>
            </ul>
          </div>
        </div>
      </div>

      <!-- รหัสผ่าน -->
      <div class="flex flex-col gap-1.5">
        <label class="text-lg uppercase tracking-wide text-slate-500"
          >รหัสผ่าน</label
        >
        <div class="relative">
          <input
            type="text"
            [(ngModel)]="newUser.password"
            class="w-full border border-slate-200 rounded-xl px-4 py-2.5 pr-12 text-base font-light bg-slate-50 focus:outline-none focus:border-[#f2e7ac] focus:bg-white focus:ring-0.5 focus:ring-[#f2e7ac] transition"
            placeholder="กรอกรหัสผ่าน"
          />
        </div>
      </div>
    </div>

    <div class="h-px bg-slate-100 mx-8"></div>

    <!-- Footer -->
    <div class="px-8 py-5 flex justify-end gap-3">
      <button
        (click)="closeModal()"
        class="px-5 py-2.5 rounded-xl border border-slate-200 bg-slate-50 text-slate-600 font-medium text-base hover:bg-slate-100 cursor-pointer transition"
      >
        ยกเลิก
      </button>
      <button
        (click)="saveUser()"
        class="px-5 py-2.5 rounded-xl text-[#394250] font-medium text-base cursor-pointer transition bg-linear-to-r from-[#f2e7ac] to-[#f2cb05] hover:from-[#f2cb05] hover:to-[#f2e7ac]"
      >
        บันทึก
      </button>
    </div>
  </div>
</div>
