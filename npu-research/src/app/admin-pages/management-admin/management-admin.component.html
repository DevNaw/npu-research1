<div
  class="contain-content bg-gray-100 p-5 md:px-10 text-2xl font-medium text-[#394250]"
>
  <div class="mx-auto md:p-6 mb-1">
    <h1 class="text-3xl">การจัดการผู้ใช้งานแอดมิน</h1>
  </div>

  <div class="mx-auto p-2 mb:p-6 md:mb-10 bg-white rounded-xl">
    <div class="flex justify-between items-center mb-4 mt-2">
      <button
        (click)="openAddModal()"
        class="flex items-center gap-2 bg-[#f2e7ac] hover:bg-[#f2cb05] text-[#394250] hover:text-[#f2f2f2] px-4 py-2 rounded-md text-lg cursor-pointer"
      >
        <i class="bi bi-plus-circle"></i> เพิ่มแอดมิน
      </button>

      <div class="flex items-center">
        <label class="text-xl mr-2">Search:</label>
        <input
          type="text"
          [(ngModel)]="searchText"
          (input)="onSearch()"
          placeholder="ค้นหา"
          class="border rounded px-2 py-1 ml-auto text-lg font-light"
        />
      </div>
    </div>

    <div class="w-full overflow-x-auto mt-4 font-light text-lg">
      <table class="w-full min-w-225 table-fixed">
        <colgroup>
          <col class="w-[5%]" />
          <col class="w-[50%]" />
          <col class="w-[30%]" />
          <col class="w-[15%]" />
        </colgroup>

        <thead class="bg-[#394250] text-white border-b">
          <tr>
            <th class="p-2">#</th>
            <th class="p-2 text-start">ชื่อ - นามสกุล</th>
            <th class="p-2">บทบาท</th>
            <th class="p-2">Action</th>
          </tr>
        </thead>

        <tbody>
          <tr
            *ngFor="let user of paginatedAdmins; let i = index"
            class="border-b border-gray-300 bg-gray-200 hover:bg-gray-50 transition"
          >
            <td class="text-center p-2">
              {{ (currentPage - 1) * pageSize + i + 1 }}
            </td>
            <td class="p-2">{{ user.first_name + " " + user.last_name }}</td>
            <td class="text-center p-2">
              {{ user.role }}
            </td>
            <td class="text-center p-2">
              <div class="flex justify-center items-center gap-2 flex-wrap">
                <button
                  class="inline-flex items-center justify-center w-9 h-9 rounded-full bg-blue-50 hover:bg-blue-100 text-blue-600 transition cursor-pointer text-xl"
                  title="แก้ไข"
                  (click)="openEditModal(user)"
                >
                  <i class="bi bi-pencil-square"></i>
                </button>

                <button
                  class="inline-flex items-center justify-center w-9 h-9 rounded-full bg-red-50 hover:bg-red-100 text-red-600 transition cursor-pointer text-xl"
                  title="ลบ"
                  (click)="deleteAdmin(user.id)"
                >
                  <i class="bi bi-trash3"></i>
                </button>
              </div>
            </td>
          </tr>

          <tr *ngIf="paginatedAdmins.length === 0">
            <td colspan="5" class="text-center text-gray-500 p-4">
              <i class="bi bi-folder-x text-3xl block mb-2"></i>
              ไม่พบข้อมูล
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div
      class="flex flex-col md:flex-row md:justify-end md:items-center mt-4 gap-2 font-light"
    >
      <div class="flex items-center justify-end space-x-1">
        <!-- Prev -->
        <button
          (click)="changePage(currentPage - 1)"
          [disabled]="currentPage === 1"
          class="px-2 md:px-3 py-1 rounded border text-sm disabled:opacity-40 hover:bg-gray-100 cursor-pointer"
        >
          ‹
        </button>

        <!-- Pages -->
        <ng-container *ngFor="let page of visiblePages">
          <!-- ปุ่มตัวเลข -->
          <button
            *ngIf="page !== '...'"
            (click)="changePage(+page)"
            class="px-2 md:px-3 py-1 rounded border text-sm transition cursor-pointer"
            [ngClass]="{
              'bg-[#f2e7ac] text-[#394250]': currentPage === page,
              'hover:bg-gray-100': currentPage !== page
            }"
          >
            {{ page }}
          </button>

          <!-- จุด ... -->
          <span
            *ngIf="page === '...'"
            class="px-2 py-1 text-sm text-gray-400 select-none"
            >...</span
          >
        </ng-container>

        <!-- Next -->
        <button
          (click)="changePage(currentPage + 1)"
          [disabled]="currentPage === totalPages"
          class="px-2 md:px-3 py-1 rounded border text-sm disabled:opacity-40 hover:bg-gray-100 cursor-pointer"
        >
          ›
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Modal Edit Password -->
<div
  *ngIf="showModal"
  class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 px-4 text-[#394250]"
  (click)="closeModal()"
>
  <div
    class="bg-white rounded-2xl w-full max-w-lg shadow-xl overflow-hidden"
    (click)="$event.stopPropagation()"
  >
    <!-- Header -->
    <div class="bg-linear-to-r from-[#f2cb05] to-[#f2e7ac] px-6 py-4 flex items-center gap-3">
      <i class="bi bi-person-plus-fill text-2xl"></i>
      <h2 class="text-2xl font-medium">เพิ่มแอดมิน</h2>
    </div>

    <!-- Body -->
    <div class="p-6 space-y-4">

      <!-- ชื่อ -->
      <div>
        <label class="block text-lg font-medium mb-1">ชื่อ</label>
        <input
          type="text"
          [(ngModel)]="adminsData!.first_name"
          class="w-full border border-gray-300 rounded-lg px-4 py-2 text-lg font-light focus:outline-none focus:ring-2 focus:ring-[#f2cb05]"
          placeholder="กรอกชื่อ"
        />
      </div>

      <!-- นามสกุล -->
      <div>
        <label class="block text-lg font-medium mb-1">นามสกุล</label>
        <input
          type="text"
          [(ngModel)]="adminsData!.last_name"
          class="w-full border border-gray-300 rounded-lg px-4 py-2 text-lg font-light focus:outline-none focus:ring-2 focus:ring-[#f2cb05]"
          placeholder="กรอกนามสกุล"
        />
      </div>

      <!-- อีเมล -->
      <div>
        <label class="block text-lg font-medium mb-1">อีเมล</label>
        <input
          type="email"
          [(ngModel)]="adminsData!.email"
          class="w-full border border-gray-300 rounded-lg px-4 py-2 text-lg font-light focus:outline-none focus:ring-2 focus:ring-[#f2cb05]"
          placeholder="กรอกอีเมล"
        />
      </div>

      <!-- รหัสผ่าน -->
      <div>
        <label class="block text-lg font-medium mb-1">รหัสผ่าน</label>
        <input
          type="password"
          [(ngModel)]="adminsData!.password"
          class="w-full border border-gray-300 rounded-lg px-4 py-2 text-lg font-light focus:outline-none focus:ring-2 focus:ring-[#f2cb05]"
          placeholder="กรอกรหัสผ่าน"
        />
      </div>
    </div>

    <!-- Footer -->
    <div class="px-6 py-4 bg-gray-50 border-t flex justify-end gap-3">
      <button
        (click)="closeModal()"
        class="px-5 py-2 rounded-lg border border-gray-300 hover:bg-gray-100 text-lg cursor-pointer transition"
      >
        ยกเลิก
      </button>
      <button
        (click)="saveExpertise()"
        class="px-5 py-2 rounded-lg bg-[#f2e7ac] hover:bg-[#f2cb05] text-[#394250] hover:text-[#f2f2f2] text-lg font-medium cursor-pointer transition flex items-center gap-2"
      >
        <i class="bi bi-check-circle"></i>
        บันทึก
      </button>
    </div>
  </div>
</div>

<div
  *ngIf="showModalEdit"
  class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 px-4 text-[#394250]"
  (click)="closeModal()"
>
  <div
    class="bg-white rounded-2xl w-full max-w-lg shadow-xl overflow-hidden"
    (click)="$event.stopPropagation()"
  >
    <!-- Header -->
    <div class="bg-linear-to-r from-[#f2cb05] to-[#f2e7ac] px-6 py-4 flex items-center gap-3">
      <i class="bi bi-pencil-square text-2xl"></i>
      <h2 class="text-2xl font-medium">แก้ไขข้อมูลแอดมิน</h2>
    </div>

    <!-- Body -->
    <div class="p-6 space-y-4 max-h-[70vh] overflow-y-auto">

      <!-- ชื่อ -->
      <div>
        <label class="block text-lg font-medium mb-1">ชื่อ</label>
        <input
          type="text"
          [(ngModel)]="updateAdmin!.first_name"
          class="w-full border border-gray-300 rounded-lg px-4 py-2 text-lg font-light focus:outline-none focus:ring-2 focus:ring-[#f2cb05]"
          placeholder="กรอกชื่อ"
        />
      </div>

      <!-- นามสกุล -->
      <div>
        <label class="block text-lg font-medium mb-1">นามสกุล</label>
        <input
          type="text"
          [(ngModel)]="updateAdmin!.last_name"
          class="w-full border border-gray-300 rounded-lg px-4 py-2 text-lg font-light focus:outline-none focus:ring-2 focus:ring-[#f2cb05]"
          placeholder="กรอกนามสกุล"
        />
      </div>

      <!-- อีเมล -->
      <div>
        <label class="block text-lg font-medium mb-1">อีเมล</label>
        <input
          type="email"
          [(ngModel)]="updateAdmin!.email"
          class="w-full border border-gray-300 rounded-lg px-4 py-2 text-lg font-light focus:outline-none focus:ring-2 focus:ring-[#f2cb05]"
          placeholder="กรอกอีเมล"
        />
      </div>

      <!-- รหัสผ่าน -->
      <div>
        <label class="block text-lg font-medium mb-1">รหัสผ่านใหม่</label>
        <input
          type="password"
          [(ngModel)]="updateAdmin!.password"
          class="w-full border border-gray-300 rounded-lg px-4 py-2 text-lg font-light focus:outline-none focus:ring-2 focus:ring-[#f2cb05]"
          placeholder="กรอกรหัสผ่านใหม่"
        />
      </div>
    </div>

    <!-- Footer -->
    <div class="px-6 py-4 bg-gray-50 border-t flex justify-end gap-3">
      <button
        (click)="closeModal()"
        class="px-5 py-2 rounded-lg border border-gray-300 hover:bg-gray-100 text-lg cursor-pointer transition"
      >
        ยกเลิก
      </button>
      <button
        (click)="updateExpertise()"
        class="px-5 py-2 rounded-lg bg-[#f2e7ac] hover:bg-[#f2cb05] text-[#394250] hover:text-[#f2f2f2] text-lg font-medium cursor-pointer transition flex items-center gap-2"
      >
        <i class="bi bi-check-circle"></i>
        อัปเดต
      </button>
    </div>
  </div>
</div>
