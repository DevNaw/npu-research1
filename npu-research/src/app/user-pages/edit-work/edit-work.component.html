<div class="bg-gray-100 min-h-screen p-5 md:p-10 text-2xl font-medium">
  <div class="mx-auto bg-white rounded-2xl shadow-lg p-4 md:p-8 space-y-8">
    <!-- Header -->
    <div class="flex items-center gap-3">
      <div class="text-black text-3xl">
        <i class="bi bi-briefcase-fill"></i>
      </div>
      <h1 class="text-3xl text-[#394250]">แก้ไขข้อมูลการทำงาน</h1>
    </div>

    <hr />

    <!-- Form -->
    <form class="space-y-3 md:space-y-6">
      <!-- ตำแหน่ง -->
      <div>
        <label class="block text-gray-700 mb-1">ตำแหน่งทางการบริหาร</label>
        <input
          type="text"
          [(ngModel)]="workInfo.position"
          name="position"
          class="w-full rounded-lg font-light text-lg border-gray-300 focus:ring-[#f2e7ac] focus:border-[#f2e7ac]"
        />
      </div>

      <!-- สังกัด -->
      <div class="relative">
        <label class="block text-gray-700 mb-1">สังกัด</label>

        <div
          (click)="toggle('organization', $event)"
          class="min-h-10.5 border rounded-md px-3 py-2 flex justify-between items-center font-light text-lg cursor-pointer"
        >
          <span>
            {{ workInfo?.organization?.faculty || "คลิกเพื่อเลือก" }}
          </span>
          <i class="bi bi-caret-down-fill text-gray-400"></i>
        </div>

        <div
          *ngIf="openDropdown === 'organization'"
          (click)="$event.stopPropagation()"
          class="absolute z-50 w-full bg-white border rounded-md mt-1 shadow font-light text-lg"
        >
          <input
            [(ngModel)]="searchOrganization"
            name="searchOrganization"
            placeholder="ค้นหา..."
            class="w-full px-3 py-2 border-b font-light text-lg outline-none"
          />

          <ul class="max-h-48 overflow-y-auto font-light text-lg">
            <li
              *ngFor="let o of filteredOrganizations()"
              (click)="selectOrganizationOption(o)"
              class="px-4 py-2 hover:bg-[#f2e7ac] cursor-pointer"
            >
              {{ o.faculty }}
            </li>

            <li
              *ngIf="filteredOrganizations().length === 0"
              class="px-4 py-3 text-center text-gray-400 italic"
            >
              <i class="bi bi-x-octagon text-3xl block mb-2"></i>
              ไม่พบข้อมูล
            </li>
          </ul>
        </div>
      </div>

      <!-- ประเภท -->
      <div>
        <label class="block text-gray-700 mb-1">ประเภท</label>

        <div class="relative md:col-span-3">
          <button
            (click)="toggle('type', $event)"
            class="w-full border rounded-md px-3 py-2 flex justify-between items-center bg-white font-light text-lg"
          >
            <span class="truncate">{{
              workInfo!.type || "เลือกประเภท"
            }}</span>
            <i class="bi bi-chevron-down"></i>
          </button>

          <div
            *ngIf="openDropdown === 'type'"
            (click)="$event.stopPropagation()"
            class="absolute z-50 mt-1 w-full bg-white border rounded-md shadow font-light text-lg"
          >
            <div
              *ngFor="let t of typeOptions"
              (click)="selectType(t)"
              class="px-3 py-2 hover:bg-gray-100 cursor-pointer"
            >
              {{ t }}
            </div>
          </div>
        </div>
      </div>

      <!-- ตำแหน่งทางวิชาการ -->
      <div>
        <label class="block text-gray-700 mb-1">
          ตำแหน่งทางวิชาการ
        </label>
        <input
          type="text"
          [(ngModel)]="workInfo!.academic_position"
          name="academicPosition"
          class="w-full rounded-lg font-light text-lg border-gray-300 focus:ring-[#f2e7ac] focus:border-[#f2e7ac]"
        />
      </div>

      <!-- ความสนใจ -->
      <div>
        <label class="block text-gray-700 mb-1">ความสนใจ</label>
        <textarea
          rows="3"
          [(ngModel)]="workInfo!.interest"
          name="interests"
          class="w-full rounded-lg border-gray-300 focus:ring-[#f2e7ac] focus:border-[#f2e7ac] font-light text-lg"
        ></textarea>
      </div>

      <!-- สาขาที่เชี่ยวชาญ -->
      <div>
        <div class="flex items-center">
          <label class="block text-xl text-gray-700 mb-1">
            สาขาที่เชี่ยวชาญ
          </label>
          <p class="text-lg text-red-600 mb-1 ml-3">*</p>
        </div>

        <div
          class="flex flex-wrap items-center gap-2 border rounded-md px-2 py-2 min-h-12 text-lg font-light mt-2 mb-6"
        >
          <span
            *ngFor="let m of selectedMajors; let i = index"
            class="flex items-center gap-2 px-2 py-1 text-[#394250] rounded-full bg-[#f2e7ac]"
          >
            {{ m.expertise }}

            <button
              type="button"
              (click)="removeMajor(i)"
              class="text-red-400 hover:text-white text-base cursor-pointer"
            >
              ✕
            </button>
          </span>

          <input
            name="majorInput"
            [(ngModel)]="majorInput"
            (keydown)="addMajor($event)"
            [attr.size]="majorInput.length || 1"
            class="outline-none font-light text-lg min-w-37.5"
            placeholder="พิมพ์แล้วกด Enter..."
          />
        </div>
      </div>

      <!-- วันที่เริ่มงาน -->
      <div class="grid grid-cols-2 gap-5">
        <div>
          <label class="block text-gray-700 mb-1"
            >วันที่เริ่มงาน</label
          >
          <input
            type="date"
            [(ngModel)]="workInfo.work_start_date"
            (change)="calculateYearsOfService()"
            name="startDate"
            class="w-full rounded-lg font-light text-lg border-gray-300 focus:ring-[#f2e7ac] focus:border-[#f2e7ac]"
          />
        </div>
        <!-- อายุงาน -->
        <div>
          <label class="block text-gray-700 mb-1">อายุงาน</label>
          <input
            type="number"
            [(ngModel)]="workInfo.year_of_service"
            name="year"
            class="w-20 md:w-50 rounded-lg font-light text-lg border-gray-300 focus:ring-[#f2e7ac] focus:border-[#f2e7ac]"
          />
          <label class="ml-3">ปี</label>
        </div>
      </div>

      <!-- Buttons -->
      <div class="flex justify-center gap-4 pt-4">
        <button
          type="submit"
          class="px-6 py-2 rounded-xl bg-[#f2e7ac] text-[#394250] hover:bg-[#f2cb05] hover:text-white shadow cursor-pointer"
          (click)="saveWork()"
        >
          บันทึกข้อมูล
        </button>

        <button
          type="button"
          class="px-6 py-2 rounded-xl bg-gray-200 hover:bg-gray-300 cursor-pointer"
          (click)="goBack()"
        >
          ยกเลิก
        </button>
      </div>
    </form>
  </div>
</div>
