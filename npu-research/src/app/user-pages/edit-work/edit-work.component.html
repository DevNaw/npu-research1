<div class="bg-gray-100 min-h-screen p-5 md:p-10 text-2xl">
  <div class="mx-auto bg-white rounded-2xl shadow-lg p-4 md:p-8 space-y-8">
    <!-- Header -->
    <div class="flex items-center gap-3">
      <div class="text-black text-3xl">
        <i class="bi bi-briefcase-fill"></i>
      </div>
      <h1 class="text-3xl font-bold text-gray-800">แก้ไขข้อมูลการทำงาน</h1>
    </div>

    <hr />

    <!-- Form -->
    <form class="space-y-3 md:space-y-6">
      <!-- ตำแหน่ง -->
      <div>
        <label class="block text-gray-700 font-bold mb-1">ตำแหน่ง</label>
        <input
          type="text"
          [(ngModel)]="workInfo.position"
          name="position"
          class="w-full rounded-lg text-2xl border-gray-300 focus:ring-indigo-500 focus:border-indigo-500"
        />
      </div>

      <!-- สังกัด -->
      <div class="relative">
        <label class="block text-gray-700 font-bold mb-1">สังกัด</label>

        <div
          (click)="toggle('organization', $event)"
          class="min-h-10.5 border rounded-md px-3 py-2 flex justify-between items-center text-2xl cursor-pointer font-medium"
        >
          <span>
            {{ workInfo.organization.faculty || "คลิกเพื่อเลือก" }}
          </span>
          <i class="bi bi-caret-down-fill text-gray-400"></i>
        </div>

        <div
          *ngIf="isOpen('organization')"
          (click)="$event.stopPropagation()"
          class="absolute z-50 w-full bg-white border rounded-md mt-1 shadow"
        >
          <input
            [(ngModel)]="searchOrganization"
            name="searchOrganization"
            placeholder="ค้นหา..."
            class="w-full px-3 py-2 border-b text-2xl font-medium outline-none"
          />

          <ul class="max-h-48 overflow-y-auto text-2xl font-medium">
            <li
              *ngFor="let o of filteredOrganizations()"
              (click)="selectOrganizationOption(o)"
              class="px-4 py-2 hover:bg-indigo-50 cursor-pointer"
            >
              {{ o.faculty }}
            </li>

            <li
              *ngIf="filteredOrganizations().length === 0"
              class="px-4 py-3 text-center text-gray-400 italic"
            >
              🔍 ไม่พบข้อมูล
            </li>
          </ul>
        </div>
      </div>

      <!-- ประเภท -->
      <div>
        <label class="block text-gray-700 font-bold mb-1">ประเภท</label>

        <div class="relative md:col-span-3">
          <button
            (click)="toggle('type', $event)"
            class="w-full border rounded-md px-3 py-2 flex justify-between items-center bg-white"
          >
            <span class="truncate font-medium">{{
              workInfo!.type || "เลือกประเภท"
            }}</span>
            <i class="bi bi-chevron-down"></i>
          </button>

          <div
            *ngIf="openDropdown === 'type'"
            (click)="$event.stopPropagation()"
            class="absolute z-50 mt-1 w-full bg-white border rounded-md shadow font-medium"
          >
            <div
              *ngFor="let t of typeOptions"
              (click)="selectType(t)"
              class="px-3 py-2 hover:bg-gray-100 cursor-pointer"
            >
              {{ t }}
            </div>
          </div>
        </div>
      </div>

      <!-- สายงาน -->
      <div>
        <label class="block text-gray-700 font-bold mb-1">สายงาน</label>
        <input
          type="text"
          [(ngModel)]="workInfo!.line_work"
          name="line"
          class="w-full rounded-lg text-2xl border-gray-300 focus:ring-indigo-500 focus:border-indigo-500"
        />
      </div>

      <!-- ตำแหน่งทางวิชาการ -->
      <div>
        <label class="block text-gray-700 font-bold mb-1">
          ตำแหน่งทางวิชาการ
        </label>
        <input
          type="text"
          [(ngModel)]="workInfo!.academic_position"
          name="academicPosition"
          class="w-full rounded-lg text-2xl border-gray-300 focus:ring-indigo-500 focus:border-indigo-500"
        />
      </div>

      <!-- ความสนใจ -->
      <div>
        <label class="block text-gray-700 font-bold mb-1">ความสนใจ</label>
        <textarea
          rows="3"
          [(ngModel)]="workInfo!.interest"
          name="interests"
          class="w-full rounded-lg border-gray-300 focus:ring-indigo-500 focus:border-indigo-500"
        ></textarea>
      </div>

      <!-- สาขาที่เชี่ยวชาญ -->
      <div class="relative">
        <div class="flex items-center">
          <label class="block text-2xl mb-1"> สาขาวิชาที่เชี่ยวชาญ </label>

          <p class="text-xl text-red-600 mb-1 ml-3">
            * เลือกได้มากกว่า 1 รายการ
          </p>
        </div>

        <div
          class="min-h-10.5 border rounded-md px-3 py-2 flex flex-wrap gap-2 text-2xl cursor-pointer font-medium"
          (click)="toggle('majors', $event)"
        >
          <span
            *ngFor="let m of selectedMajors; let i = index"
            class="bg-indigo-500 text-white px-3 py-1 rounded-full flex items-center"
          >
            {{ m.name_th }}
            <span
              class="ml-2 cursor-pointer hover:text-gray-300"
              (click)="removeMajor(i); $event.stopPropagation()"
            >
              ✕
            </span>
          </span>

          <div
            class="flex items-center justify-between w-full"
            *ngIf="selectedMajors.length === 0"
          >
            <span class="text-gray-400 font-medium"> คลิกเพื่อเลือก </span>

            <i
              class="bi bi-caret-down-fill text-gray-400 transition-transform duration-300"
            ></i>
          </div>
        </div>

        <div
          *ngIf="isOpen('majors')"
          class="absolute z-50 w-full bg-white border rounded-md mt-1 shadow"
          (click)="$event.stopPropagation()"
        >
          <input
            name="searchMajor"
            [(ngModel)]="searchMajor"
            name="searchMajor"
            placeholder="ค้นหา..."
            class="w-full px-3 py-2 border-b text-2xl font-medium outline-none"
          />

          <ul class="max-h-48 overflow-y-auto text-2xl font-medium">
            <li
              *ngFor="let m of filteredMajors()"
              (click)="selectMajor(m)"
              class="px-4 py-2 hover:bg-indigo-50 cursor-pointer"
            >
              {{ m.name_th }}
            </li>

            <li
              *ngIf="filteredMajors().length === 0"
              class="px-4 py-3 text-center text-gray-400 italic"
            >
              🔍 ไม่พบข้อมูล
            </li>
          </ul>
        </div>
      </div>

      <!-- วันที่เริ่มงาน -->
      <div class="grid grid-cols-2 gap-5">
        <div>
          <label class="block text-gray-700 font-bold mb-1"
            >วันที่เริ่มงาน</label
          >
          <input
            type="date"
            [(ngModel)]="workInfo.work_start_date"
            name="startDate"
            class="w-full rounded-lg text-2xl border-gray-300 focus:ring-indigo-500 focus:border-indigo-500"
          />
        </div>
        <!-- อายุงาน -->
        <div>
          <label class="block text-gray-700 font-bold mb-1">อายุงาน</label>
          <input
            type="number"
            [(ngModel)]="workInfo.year_of_service"
            name="year"
            class="w-50 rounded-lg text-2xl border-gray-300 focus:ring-indigo-500 focus:border-indigo-500"
          />
          <label class="ml-3">ปี</label>
        </div>
      </div>

      <!-- Buttons -->
      <div class="flex justify-center gap-4 pt-4">
        <button
          type="button"
          class="px-6 py-2 rounded-xl bg-gray-200 hover:bg-gray-300 cursor-pointer"
          (click)="goBack()"
        >
          ยกเลิก
        </button>

        <button
          type="submit"
          class="px-6 py-2 rounded-xl bg-yellow-300 text-black hover:bg-yellow-400 shadow cursor-pointer"
          (click)="saveWork()"
        >
          บันทึกข้อมูล
        </button>
      </div>
    </form>
  </div>
</div>
