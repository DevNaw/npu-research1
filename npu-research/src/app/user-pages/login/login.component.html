<div
  class="flex lg:items-center justify-center min-h-screen bg-linear-to-br from-gray-100 to-gray-200 px-4 font-medium"
>
  <div class="space-y-2 mt-30">
    <!-- Title -->
    <div class="flex items-center gap-4">
      <!-- Logo -->
      <img
        src="/assets/logoNPU.png"
        alt="NPU"
        class="w-24 sm:w-28 object-contain"
      />

      <!-- Text -->
      <div class="space-y-0 leading-none">
        <h2 class="text-2xl sm:text-4xl text-[#394250] leading-none">
          ระบบฐานข้อมูลวิจัย
        </h2>

        <h3 class="text-xl sm:text-2xl text-gray-400">
          Research Database System
        </h3>

        <h2 class="text-2xl sm:text-4xl text-[#16498C] m-0">
          มหาวิทยาลัยนครพนม
        </h2>
      </div>
    </div>

    <!-- Form -->
    <form class="space-y-4" (ngSubmit)="goToDashboard()">
      <!-- Username -->
      <div>
        <div class="flex items-center gap-3">
          <!-- Icon (อยู่นอก input) -->
          <i class="bi bi-person-circle text-2xl"></i>

          <!-- Input -->
          <input
            [(ngModel)]="username"
            name="username"
            type="text"
            [(ngModel)]="username"
            required
            class="w-full px-4 py-1 border border-gray-300 rounded-md focus:outline-none focus:ring-0.5 focus:ring-[#118CD9] focus:border-[#118CD9] transition text-xl font-light"
            placeholder="Email"
          />
        </div>
      </div>

      <!-- Password -->
      <div>
        <div class="flex items-center gap-3">
          <i class="bi bi-lock-fill text-2xl"></i>
          <input
            [(ngModel)]="password"
            [(ngModel)]="password"
            name="password"
            type="password"
            required
            class="w-full px-4 py-1 border border-gray-300 rounded-md focus:outline-none text-xl focus:ring-0.5 focus:ring-[#118CD9] focus:border-[#118CD9] transition font-light"
            placeholder="Password"
          />
        </div>
      </div>

      <!-- Button -->
      <div class="flex justify-center items-center">
        <button
          type="submit"
          class="w-48 py-3 rounded-xl bg-linear-to-r from-[#118CD9] to-[#094A73] hover:from-[#094A73] hover:to-[#118CD9] text-white text-2xl shadow-xl hover:shadow-2xl transition-all duration-200 focus:ring-2 focus:ring-yellow-400 focus:ring-offset-2 flex items-center justify-center cursor-pointer"
        >
          เข้าสู่ระบบ
        </button>
      </div>
    </form>

    <!-- Register -->
    <div class="text-center pt-2">
      <p class="text-xl text-[#394250]">
        ยังไม่มีบัญชีผู้ใช้ ?
        <a routerLink="/register" class="ml-1 text-[#16498C] hover:underline">
          ลงทะเบียน
        </a>
      </p>
    </div>
  </div>
</div>
