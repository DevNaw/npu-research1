<div
  class="flex lg:items-center justify-center min-h-screen bg-linear-to-br from-gray-100 to-gray-200 px-4 font-medium"
>
  <div class="space-y-2 mt-30">
    <!-- Title -->
    <div class="flex items-center gap-4">
      <!-- Logo -->
      <img
        src="/assets/logoNPU.png"
        alt="NPU"
        class="w-24 sm:w-28 object-contain"
      />

      <!-- Text -->
      <div class="space-y-0 leading-none">
        <h2 class="text-2xl sm:text-4xl text-[#394250] leading-none">
          ระบบฐานข้อมูลวิจัย
        </h2>

        <h3 class="text-xl sm:text-2xl text-gray-400">
          Research Database System
        </h3>

        <h2 class="text-2xl sm:text-4xl text-[#f2cb05] m-0">
          มหาวิทยาลัยนครพนม
        </h2>
      </div>
    </div>

    <!-- Form -->
    <form class="space-y-4" (ngSubmit)="goToDashboard()">
      <!-- Username -->
      <div>
        <div class="flex items-center gap-3">
          <!-- Icon (อยู่นอก input) -->
          <i class="bi bi-person-circle text-2xl"></i>

          <!-- Input -->
          <input
            [(ngModel)]="username"
            name="username"
            type="text"
            [(ngModel)]="username"
            required
            class="w-full px-4 py-1 border border-gray-300 rounded-md focus:outline-none focus:ring-0.5 focus:ring-[#f2e7ac] focus:border-[#f2e7ac] transition text-xl font-light"
            placeholder="Email"
          />
        </div>
      </div>

      <!-- Password -->
      <div>
        <div class="flex items-center gap-3">
          <i class="bi bi-lock-fill text-2xl"></i>
          <div class="relative w-full">
            <input
              [(ngModel)]="password"
              name="password"
              [type]="showPassword ? 'text' : 'password'"
              required
              class="w-full px-4 py-1 pr-10 border border-gray-300 rounded-md focus:outline-none text-xl focus:ring-0.5 focus:ring-[#f2e7ac] focus:border-[#f2e7ac] transition font-light"
              placeholder="Password"
            />
            <button
              type="button"
              (click)="showPassword = !showPassword"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 cursor-pointer border-0 bg-transparent"
            >
              <i class="bi text-xl" [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'"></i>
            </button>
          </div>
        </div>
      </div>

      <!-- Button -->
      <div class="flex justify-center items-center">
        <button
          type="submit"
          class="w-48 py-3 rounded-full bg-linear-to-r from-[#f2e7ac] to-[#f2cb05] hover:from-[#f2cb05] hover:to-[#f2e7ac] text-black text-2xl shadow-xl hover:shadow-2xl transition-all duration-200 flex items-center justify-center cursor-pointer"
        >
          เข้าสู่ระบบ
        </button>
      </div>
    </form>

    <!-- Register -->
    <div class="text-center pt-2">
      <p class="text-xl text-[#394250]">
        ยังไม่มีบัญชีผู้ใช้ ?
        <a routerLink="/register" class="ml-1 text-[#f2cb05] hover:underline">
          ลงทะเบียน
        </a>
      </p>
    </div>
  </div>
</div>
