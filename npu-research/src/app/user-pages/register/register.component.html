<div
  class="min-h-screen flex lg:items-center justify-center bg-gray-100 md:px-4 text-2xl font-medium text-[#394250]"
>
  <div class="w-full max-w-xl space-y-2 p-5 md:p-8">
    <!-- Header -->
    <div class="text-center space-y-1">
      <h2 class="text-3xl text-gray-800">ลงทะเบียนผู้ใช้งาน</h2>

      <!-- Back -->
      <button
        (click)="goToLogin()"
        class="flex items-center gap-2 group justify-start cursor-pointer"
      >
        <i
          class="bi bi-arrow-left-circle-fill text-xl group-hover:text-[#118CD9] group-hover:-translate-x-1 transition-all"
        ></i>
        <span class="text-lg">กลับไปเข้าสู่ระบบ</span>
      </button>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-lg p-2 sm:p-8 space-y-6">
      <form class="space-y-2 md:space-y-5" (ngSubmit)="submit()">
        <!-- Name -->
        <div class="flex gap-2 md:gap-6">
          <div>
            <div class="flex items-center">
              <label class="block mb-1 text-xl">ชื่อ</label>
              <p class="text-lg text-red-600 mb-1 ml-3">*</p>
            </div>

            <div class="relative">
              <i
                class="bi bi-person-circle absolute left-3 top-1/2 -translate-y-1/2 text-xl text-gray-400"
              ></i>
              <input
                name="first_name"
                [(ngModel)]="registerData.first_name"
                type="text"
                class="w-full pl-12 pr-4 py-2 border rounded-md font-light text-lg"
                placeholder="กรอกชื่อ"
              />
            </div>
          </div>

          <div>
            <div class="flex items-center">
              <label class="block mb-1 text-xl">นามสกุล</label>
              <p class="text-lg text-red-600 mb-1 ml-3">*</p>
            </div>

            <div class="relative">
              <i
                class="bi bi-person-circle absolute left-3 top-1/2 -translate-y-1/2 text-xl text-gray-400"
              ></i>
              <input
                name="last_name"
                [(ngModel)]="registerData.last_name"
                type="text"
                class="w-full pl-12 pr-4 py-2 border rounded-md font-light text-lg"
                placeholder="กรอกนามสกุล"
              />
            </div>
          </div>
        </div>

        <!-- Email -->
        <div>
          <div class="flex items-center">
            <label class="block text-xl text-gray-700 mb-1"> อีเมล </label>
            <p class="text-sm text-red-600 mb-1 ml-3">(เฉพาะ &#64;npu.ac.th เท่านั้น!) <span class="text-lg">*</span></p>
          </div>

          <div class="relative">
            <i
              class="bi bi-lock-fill absolute left-3 top-1/2 -translate-y-1/2 text-xl text-gray-400"
            ></i>

            <input
              name="email"
              [(ngModel)]="registerData.email"
              type="text"
              class="w-full pl-12 pr-4 py-2 border rounded-md font-light text-lg"
              placeholder="กรอกอีเมล"
            />
          </div>
        </div>

        <!-- Password -->
        <div>
          <div class="flex items-center">
            <label class="block text-xl text-gray-700 mb-1"> รหัสผ่าน </label>
            <p class="text-lg text-red-600 mb-1 ml-3">*</p>
          </div>

          <div class="relative">
            <i
              class="bi bi-lock-fill absolute left-3 top-1/2 -translate-y-1/2 text-xl text-gray-400"
            ></i>

            <input
              name="Password"
              [(ngModel)]="registerData.password"
              type="text"
              class="w-full pl-12 pr-4 py-2 border rounded-md font-light text-lg"
              placeholder="รหัส"
            />
          </div>
        </div>

        <!-- Password Confirmation -->
        <div>
          <div class="flex items-center">
            <label class="block text-xl text-gray-700 mb-1">
              ยืนยันรหัสผ่าน
            </label>
            <p class="text-lg text-red-600 mb-1 ml-3">*</p>
          </div>

          <div class="relative">
            <i
              class="bi bi-lock-fill absolute left-3 top-1/2 -translate-y-1/2 text-xl text-gray-400"
            ></i>

            <input
              name="password_confirmation"
              [(ngModel)]="registerData.password_confirmation"
              type="text"
              class="w-full pl-12 pr-4 py-2 border rounded-md font-light text-lg"
              placeholder="ยืนยันรหัสผ่าน"
            />
          </div>
        </div>

        <!-- Majors -->
        <div class="relative">
          <div class="flex items-center">
            <label class="block text-xl mb-1"> สาขาวิชาที่เชี่ยวชาญ </label>

            <p class="text-sm text-red-600 mb-1 ml-3">
              * เลือกได้มากกว่า 1 รายการ
            </p>
          </div>

          <div
            class="min-h-10.5 border rounded-md px-3 py-2 flex flex-wrap gap-2 cursor-pointer font-light text-lg"
            (click)="toggle('majors', $event)"
          >
            <span
              *ngFor="let m of selectedMajors; let i = index"
              class="bg-indigo-500 text-white px-3 py-1 rounded-full flex items-center font-light text-lg"
            >
              {{ m.name_th }}
              <span
                class="ml-2 cursor-pointer hover:text-gray-300"
                (click)="removeMajor(i); $event.stopPropagation()"
              >
                ✕
              </span>
            </span>

            <div
              class="flex items-center justify-between w-full font-light text-lg"
              *ngIf="selectedMajors.length === 0"
            >
              <span class="text-gray-400"> คลิกเพื่อเลือก </span>

              <i
                class="bi bi-caret-down-fill text-gray-400 transition-transform duration-300"
              ></i>
            </div>
          </div>

          <div
            *ngIf="isOpen('majors')"
            class="absolute z-50 w-full bg-white border rounded-md mt-1 shadow font-light text-lg"
            (click)="$event.stopPropagation()"
          >
            <input
              name="searchMajor"
              [(ngModel)]="searchMajor"
              name="searchMajor"
              placeholder="ค้นหา..."
              class="w-full px-3 py-2 border-b text-xl outline-none"
            />

            <ul class="max-h-48 overflow-y-auto text-xl">
              <li
                *ngFor="let m of filteredMajors()"
                (click)="selectMajor(m)"
                class="px-4 py-2 hover:bg-indigo-50 cursor-pointer"
              >
                {{ m.name_th }}
              </li>

              <li
                *ngIf="filteredMajors().length === 0"
                class="px-4 py-3 text-center text-gray-400 italic"
              >
                🔍 ไม่พบข้อมูล
              </li>
            </ul>
          </div>
        </div>

        <!-- Interest -->
        <div>
          <label class="block text-xl text-gray-700 mb-1">
            ความสนใจพิเศษ
          </label>

          <textarea
            rows="3"
            class="w-full px-4 py-2 border rounded-md font-light text-lg"
            placeholder="ระบุความสนใจพิเศษ"
          ></textarea>
        </div>

        <!-- Submit -->
        <button
          type="submit"
          class="w-full py-2.5 rounded-md bg-linear-to-r from-[#118CD9] to-[#094A73] hover:from-[#094A73] hover:to-[#118CD9] text-white text-2xl shadow-xl hover:shadow-2xl cursor-pointer transition"
        >
          ลงทะเบียน
        </button>
      </form>
    </div>
  </div>
</div>
