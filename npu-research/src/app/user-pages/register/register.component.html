<div
  class="min-h-screen flex lg:items-center justify-center bg-gray-100 md:px-4 text-[#394250] font-medium"
>
  <div class="w-full max-w-xl p-5 md:p-8">
    <!-- Header -->
    <div class="mb-4 space-y-1">
      <h2 class="text-3xl text-center">ลงทะเบียนผู้ใช้งาน</h2>
      <button
        (click)="goToLogin()"
        class="flex items-center gap-2 group cursor-pointer"
      >
        <i
          class="bi bi-arrow-left-circle-fill text-xl group-hover:text-[#f2cb05] group-hover:-translate-x-1 transition-all"
        ></i>
        <span class="text-lg">กลับไปเข้าสู่ระบบ</span>
      </button>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
      <!-- Card Header -->
      <div
        class="bg-linear-to-r from-[#f2cb05] to-[#f2e7ac] px-6 py-4 flex items-center gap-3"
      >
        <i class="bi bi-person-plus-fill text-2xl"></i>
        <h3 class="text-2xl">กรอกข้อมูลผู้ใช้งาน</h3>
      </div>

      <!-- Form -->
      <form class="p-6 space-y-4" (ngSubmit)="submit()">
        <!-- ชื่อ - นามสกุล -->
        <div class="flex gap-4">
          <div class="flex-1">
            <label class="block text-lg font-medium mb-1"
              >ชื่อ <span class="text-red-500">*</span></label
            >
            <div class="relative">
              <i
                class="bi bi-person-circle absolute left-3 top-1/2 -translate-y-1/2 text-lg text-gray-400"
              ></i>
              <input
                name="first_name"
                [(ngModel)]="registerData.first_name"
                type="text"
                class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg text-lg font-light focus:outline-none focus:ring-2 focus:ring-[#f2cb05]"
                placeholder="กรอกชื่อ"
              />
            </div>
          </div>

          <div class="flex-1">
            <label class="block text-lg font-medium mb-1"
              >นามสกุล <span class="text-red-500">*</span></label
            >
            <div class="relative">
              <i
                class="bi bi-person-circle absolute left-3 top-1/2 -translate-y-1/2 text-lg text-gray-400"
              ></i>
              <input
                name="last_name"
                [(ngModel)]="registerData.last_name"
                type="text"
                class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg text-lg font-light focus:outline-none focus:ring-2 focus:ring-[#f2cb05]"
                placeholder="กรอกนามสกุล"
              />
            </div>
          </div>
        </div>

        <!-- อีเมล -->
        <div>
          <label class="block text-lg font-medium mb-1">
            อีเมล <span class="text-red-500">*</span>
            <span class="text-sm text-red-400 font-light ml-1"
              >(เฉพาะ &#64;npu.ac.th เท่านั้น)</span
            >
          </label>
          <div class="relative">
            <i
              class="bi bi-envelope-fill absolute left-3 top-1/2 -translate-y-1/2 text-lg text-gray-400"
            ></i>
            <input
              name="email"
              [(ngModel)]="registerData.email"
              type="email"
              class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg text-lg font-light focus:outline-none focus:ring-2 focus:ring-[#f2cb05]"
              placeholder="กรอกอีเมล"
            />
          </div>
        </div>

        <!-- หน่วยงาน -->
        <div>
          <label class="block text-lg font-medium mb-1"
            >หน่วยงาน <span class="text-red-500">*</span></label
          >
          <div class="relative">
            <button
              type="button"
              (click)="toggle('organization', $event)"
              class="w-full border border-gray-300 rounded-lg px-4 py-2 flex justify-between items-center bg-white text-lg font-light focus:outline-none focus:ring-2 focus:ring-[#f2cb05]"
            >
              <span class="truncate">
                {{ selectedOrganization?.faculty || "เลือกหน่วยงาน" }}
              </span>
              <i class="bi bi-chevron-down"></i>
            </button>

            <div
              *ngIf="openDropdown === 'organization'"
              (click)="$event.stopPropagation()"
              class="absolute z-50 w-full bg-white border border-gray-200 rounded-lg mt-1 shadow-md text-lg font-light"
            >
              <ul class="max-h-48 overflow-y-auto">
                <li
                  *ngFor="let o of organizations"
                  (click)="selectOrganization(o)"
                  class="px-4 py-2 hover:bg-[#f2e7ac] cursor-pointer"
                >
                  {{ o.faculty }}
                </li>
              </ul>
            </div>
          </div>
        </div>

        <!-- รหัสผ่าน -->
        <div>
          <label class="block text-lg font-medium mb-1"
            >รหัสผ่าน <span class="text-red-500">*</span></label
          >
          <div class="relative">
            <i
              class="bi bi-lock-fill absolute left-3 top-1/2 -translate-y-1/2 text-lg text-gray-400"
            ></i>
            <input
              name="Password"
              [(ngModel)]="registerData.password"
              [type]="showPassword ? 'text' : 'password'"
              class="w-full pl-10 pr-10 py-2 border border-gray-300 rounded-lg text-lg font-light focus:outline-none focus:ring-2 focus:ring-[#f2cb05]"
              placeholder="กรอกรหัสผ่าน"
            />
            <button
              type="button"
              (click)="showPassword = !showPassword"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 cursor-pointer"
            >
              <i
                class="bi bi-{{ showPassword ? 'eye-slash-fill' : 'eye-fill' }}"
              ></i>
            </button>
          </div>
        </div>

        <!-- ยืนยันรหัสผ่าน -->
        <div>
          <label class="block text-lg font-medium mb-1"
            >ยืนยันรหัสผ่าน <span class="text-red-500">*</span></label
          >
          <div class="relative">
            <i
              class="bi bi-lock-fill absolute left-3 top-1/2 -translate-y-1/2 text-lg text-gray-400"
            ></i>
            <input
              name="password_confirmation"
              [(ngModel)]="registerData.password_confirmation"
              [type]="showConfirmPassword ? 'text' : 'password'"
              class="w-full pl-10 pr-10 py-2 border border-gray-300 rounded-lg text-lg font-light focus:outline-none focus:ring-2 focus:ring-[#f2cb05]"
              placeholder="ยืนยันรหัสผ่าน"
            />
            <button
              type="button"
              (click)="showConfirmPassword = !showConfirmPassword"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 cursor-pointer"
            >
              <i
                class="bi bi-{{
                  showConfirmPassword ? 'eye-slash-fill' : 'eye-fill'
                }}"
              ></i>
            </button>
          </div>
        </div>

        <!-- สาขาที่เชี่ยวชาญ -->
        <div>
          <label class="block text-lg font-medium mb-1"
            >สาขาที่เชี่ยวชาญ <span class="text-red-500">*</span></label
          >
          <div
            class="flex flex-wrap items-center gap-2 border border-gray-300 rounded-lg px-3 py-2 min-h-12 focus-within:ring-2 focus-within:ring-[#f2cb05]"
          >
            <span
              *ngFor="let m of registerData.expertises; let i = index"
              class="flex items-center gap-1 px-3 py-1 text-[#394250] text-lg font-light rounded-full bg-linear-to-r from-[#f2cb05] to-[#f2e7ac]"
            >
              {{ m }}
              <button
                type="button"
                (click)="removeMajor(i)"
                class="text-red-600 cursor-pointer text-sm"
              >
                ✕
              </button>
            </span>
            <input
              name="majorInput"
              [(ngModel)]="majorInput"
              (keydown)="addMajor($event)"
              [attr.size]="majorInput.length || 1"
              class="outline-none font-light text-lg min-w-50"
              placeholder="พิมพ์แล้วกด Enter..."
            />
          </div>
        </div>

        <!-- ความสนใจพิเศษ -->
        <div>
          <label class="block text-lg font-medium mb-1">ความสนใจพิเศษ</label>
          <textarea
            name="interests"
            rows="3"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg text-lg font-light focus:outline-none focus:ring-2 focus:ring-[#f2cb05]"
            placeholder="ระบุความสนใจพิเศษ"
          ></textarea>
        </div>

        <!-- Submit -->
        <button
          type="submit"
          class="w-full py-3 rounded-lg bg-[#f2e7ac] hover:bg-[#f2cb05] text-[#394250] hover:text-[#f2f2f2] text-xl font-medium shadow cursor-pointer transition flex items-center justify-center gap-2"
        >
          <i class="bi bi-person-check-fill"></i>
          ลงทะเบียน
        </button>
      </form>
    </div>
  </div>
</div>
