<div class="bg-gray-100 min-h-screen p-5 md:p-10 text-2xl font-medium">
  <div class="mx-auto bg-white rounded-2xl shadow p-4 md:p-8 space-y-10">
    <!-- Header -->
    <div>
      <h1 class="text-3xl text-[#394250]">แก้ไขข้อมูลนักวิจัย</h1>
      <div class="flex items-center gap-2 mt-1 md:mt-3 text-[#0F4C82]">
        <i class="bi bi-pencil-square"></i>
        <span>ข้อมูลประวัติทั่วไป</span>
      </div>
      <hr class="mt-4" />
    </div>

    <!-- ================= Section 1 ================= -->
    <div class="grid grid-cols-12 gap-3 md:gap-6">
      <div class="col-span-12">
        <label>เลขบัตรประจำตัวประชาชน</label>
        <input
          [(ngModel)]="data.id_card_number"
          class="w-full border rounded px-3 py-2 font-light text-lg"
        />
      </div>

      <div class="col-span-12 md:col-span-3">
        <label>คำนำหน้าชื่อ</label>
        <input
          [(ngModel)]="data.prefix_th"
          class="w-full border rounded px-3 py-2 font-light text-lg"
        />
      </div>

      <div class="col-span-12 md:col-span-4">
        <label>ชื่อ</label>
        <input
          [(ngModel)]="data.first_name"
          class="w-full border rounded px-3 py-2 font-light text-lg"
        />
      </div>

      <div class="col-span-12 md:col-span-5">
        <label>นามสกุล</label>
        <input
          [(ngModel)]="data.last_name"
          class="w-full border rounded px-3 py-2 font-light text-lg"
        />
      </div>
    </div>

    <!-- ================= Section 2 ================= -->
    <div class="grid grid-cols-12 gap-3 md:gap-6">
      <div class="col-span-12 md:col-span-3">
        <label>คำนำหน้าชื่อ (EN)</label>
        <input
          [(ngModel)]="data.prefix_en"
          class="w-full border rounded px-3 py-2 font-light text-lg"
        />
      </div>

      <div class="col-span-12 md:col-span-4">
        <label>ชื่อภาษาอังกฤษ</label>
        <input
          [(ngModel)]="data.first_name_en"
          class="w-full border rounded px-3 py-2 font-light text-lg"
        />
      </div>

      <div class="col-span-12 md:col-span-5">
        <label>นามสกุลภาษาอังกฤษ</label>
        <input
          [(ngModel)]="data.last_name_en"
          class="w-full border rounded px-3 py-2 font-light text-lg"
        />
      </div>

      <div class="col-span-12 md:col-span-4">
        <label>วัน/เดือน/ปีเกิด</label>
        <input
          [(ngModel)]="data.date_of_birth"
          type="date"
          (change)="calculateAge()"
          class="w-full border rounded px-3 py-2 font-light text-lg"
        />
      </div>

      <div class="col-span-12 md:col-span-2">
        <label>อายุ</label>
        <div class="flex items-center gap-2">
          <input
            [(ngModel)]="data.age"
            type="number"
            class="w-40 border rounded px-3 py-2 font-light text-lg text-center"
          />
          <span class="shrink-0">ปี</span>
        </div>
      </div>
    </div>

    <!-- ================= Section 3 ================= -->
    <div class="grid grid-cols-12 gap-3 md:gap-6">
      <div class="col-span-12 md:col-span-4 relative">
        <label>เชื้อชาติ</label>
        <button
          (click)="toggle('ethnicity', $event)"
          class="w-full border rounded px-3 py-2 flex justify-between font-light text-lg"
        >
          {{ data.ethnicity || "เลือก" }}
          <i class="bi bi-chevron-down"></i>
        </button>
        <div
          *ngIf="isOpen('ethnicity')"
          class="absolute z-50 w-full bg-white border mt-1 shadow font-light text-lg"
          (click)="$event.stopPropagation()"
        >
          <input
            [(ngModel)]="searchEthnicity"
            placeholder="ค้นหา..."
            class="w-full px-3 py-2 border-b"
          />
          <ul>
            <li
              *ngFor="let e of filteredEthnicity()"
              (click)="selectEthnicitys(e)"
              class="px-4 py-2 hover:bg-indigo-50 cursor-pointer"
            >
              {{ e }}
            </li>
            <li
              *ngIf="filteredEthnicity().length === 0"
              class="px-4 py-2 text-gray-400"
            >
              ไม่พบข้อมูล
            </li>
          </ul>
        </div>
      </div>

      <div class="col-span-12 md:col-span-4 relative">
        <label>สัญชาติ</label>
        <button
          type="button"
          (click)="toggle('nationality', $event)"
          class="w-full border rounded px-3 py-2 flex justify-between items-center font-light text-lg"
        >
          {{ data.nationality || "เลือก" }}
          <i class="bi bi-chevron-down"></i>
        </button>
        <div
          *ngIf="isOpen('nationality')"
          class="absolute z-50 w-full bg-white border mt-1 shadow rounded font-light text-lg"
          (click)="$event.stopPropagation()"
        >
          <input
            [(ngModel)]="searchNationality"
            placeholder="ค้นหา..."
            class="w-full px-3 py-2 border-b outline-none"
            (click)="$event.stopPropagation()"
          />
          <ul class="max-h-48 overflow-y-auto">
            <li
              *ngFor="let n of filteredNationality()"
              (click)="selectNationalitys(n)"
              class="px-4 py-2 hover:bg-indigo-50 cursor-pointer"
            >
              {{ n }}
            </li>
            <li
              *ngIf="filteredNationality().length === 0"
              class="px-4 py-2 text-gray-400"
            >
              ไม่พบข้อมูล
            </li>
          </ul>
        </div>
      </div>

      <div class="col-span-12 md:col-span-4 relative">
        <label>ศาสนา</label>
        <button
          (click)="toggle('religion', $event)"
          class="w-full border rounded px-3 py-2 flex justify-between font-light text-lg"
        >
          {{ data.religion || "เลือก" }}
          <i class="bi bi-chevron-down"></i>
        </button>
        <div
          *ngIf="isOpen('religion')"
          class="absolute z-50 w-full bg-white border mt-1 shadow font-light text-lg"
          (click)="$event.stopPropagation()"
        >
          <input
            [(ngModel)]="searchReligion"
            placeholder="ค้นหา..."
            class="w-full px-3 py-2 border-b"
          />
          <ul>
            <li
              *ngFor="let r of filteredReligion()"
              (click)="selectReligion(r)"
              class="px-4 py-2 hover:bg-indigo-50 cursor-pointer"
            >
              {{ r }}
            </li>
            <li
              *ngIf="filteredReligion().length === 0"
              class="px-4 py-2 text-gray-400"
            >
              ไม่พบข้อมูล
            </li>
          </ul>
        </div>
      </div>

      <div class="col-span-12 md:col-span-6">
        <label>เบอร์โทรศัพท์มือถือ</label>
        <input
          [(ngModel)]="data.phone"
          class="w-full border rounded px-3 py-2 font-light text-lg"
        />
      </div>

      <div class="col-span-12 md:col-span-6">
        <label>อีเมล</label>
        <input
          [(ngModel)]="data.email"
          class="w-full border rounded px-3 py-2 font-light text-lg"
        />
      </div>
    </div>

    <!-- Save -->
    <div class="flex justify-center mt-6">
      <button
        (click)="save()"
        class="px-6 py-2 bg-[#118CD9] text-white rounded hover:bg-[#4c7b98] cursor-pointer"
      >
        <i class="bi bi-floppy2"></i>
        บันทึกข้อมูล
      </button>
    </div>
  </div>
</div>
